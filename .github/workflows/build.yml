name: CI Build - Multi-Board

on:
  workflow_dispatch:
    inputs:
      board_select:
        description: 'Válaszd ki a fordítandó board nevet (portot is tartalmazza)'
        required: true
        type: choice
        default: 'stm32/MY_H743_BOARD'
        options:
          # STM32 Boards
          - 'stm32/MY_H743_BOARD'
          - 'stm32/GARATRONIC_PYBSTICK26_F411'
          - 'stm32/PYBV4'
          - 'stm32/PYBV3'
          # ESP32 Boards
          - 'esp32/GENERIC'
          - 'esp32/ESP32_WROVER'
          - 'esp32/ESP32_GENERIC_S3'

jobs:
  build_firmware:
    runs-on: ubuntu-latest
    
    steps:
      # ... (A korábbi lépések változatlanok) ...

      - name: 🟢 ESP32 Eszközlánc Kézi Telepítése (ha ESP32-t választottál)
        if: steps.config.outputs.port == 'esp32'
        run: |
          # ESP-IDF Git-ből való klónozása és telepítése
          git clone --recursive https://github.com/espressif/esp-idf.git $HOME/esp/esp-idf
          $HOME/esp/esp-idf/install.sh
          
          # Létrehozunk egy jelölő fájlt, amit a következő lépésben forrásként használunk
          # Mivel a környezet változókat nem lehet közvetlenül átadni a job-ok között,
          # a build parancsot kell módosítanunk.
          echo "TELEPÍTÉS SIKERES"

      - name: Compile Cross-Compiler (mpy-cross)
        run: make -C mpy-cross

      - name: 🔨 Firmware Fordítása
        # Ez a lépés most feltételes, és betölti az ESP-IDF környezetet
        run: |
          PORT=${{ steps.config.outputs.port }}
          BOARD=${{ steps.config.outputs.board }}
          
          if [ "$PORT" == "esp32" ]; then
            echo "ESP32 környezet betöltése és fordítás..."
            
            # A forrásfájl futtatása beállítja a szükséges $PATH változókat
            source $HOME/esp/esp-idf/export.sh
            
            # Ezután futtatjuk a make parancsot
            make -C ports/$PORT BOARD=$BOARD
          else
            echo "STM32/Más port fordítása..."
            make -C ports/$PORT BOARD=$BOARD
          fi
        shell: bash # Fontos: A 'source' parancs miatt bash shellt kell használni

      - name: 📦 Firmware fájlok feltöltése Artifactként
        uses: actions/upload-artifact@v4
        with:
          # ... (A korábbi feltöltési lépés változatlan) ...