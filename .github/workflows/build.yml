name: CI Build

on:
  workflow_dispatch:
    inputs:
      board_name:
        description: 'A MicroPython kártya neve (pl. PYBV3 vagy MY_H743_BOARD)'
        required: true
        default: 'MY_H743_BOARD'

jobs:
  build_firmware:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential python3 python3-pip gcc-arm-none-eabi
          pip3 install pyelftools

      - name: Compile Cross-Compiler (mpy-cross)
        run: make -C mpy-cross

      - name: Build firmware
        run: make -C ports/stm32 BOARD=${{ github.event.inputs.board_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.board_name }}-firmware
          path: ports/stm32/build-${{ github.event.inputs.board_name }}
