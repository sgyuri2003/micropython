name: CI Build - Multi-Board

on:
  workflow_dispatch:
    inputs:
      board_select: # Átnevezve board_select-re, mert portot is tartalmaz
        description: 'Válaszd ki a fordítandó board nevet (portot is tartalmazza)'
        required: true
        type: choice
        default: 'stm32/MY_H743_BOARD' # Új default formátum
        options:
          # STM32 Boards
          - 'stm32/MY_H743_BOARD'
          - 'stm32/GARATRONIC_PYBSTICK26_F411'
          - 'stm32/PYBV4'
          - 'stm32/PYBV3'
          # ESP32 Boards
          - 'esp32/GENERIC'
          - 'esp32/ESP32_WROVER'
          - 'esp32/ESP32_GENERIC_S3' # Ezt az opciót megtartottam a régi listádból

jobs:
  build_firmware:
    runs-on: ubuntu-latest
    
    steps:
      - name: ⚙️ Kódbázis letöltése (Checkout)
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: 🛠️ Build Környezet Beállítása
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential python3 python3-pip
          # A gcc-arm-none-eabi megtartva az STM32-höz
          sudo apt-get install -y gcc-arm-none-eabi 
          pip3 install pyelftools

      - name: 🎯 Port és Board azonosítása
        id: config
        run: |
          # A kiválasztott board_select értékét kettévágjuk / mentén
          BOARD_PATH="${{ github.event.inputs.board_select }}"
          PORT_NAME=$(echo "$BOARD_PATH" | cut -d'/' -f1)
          BOARD_NAME=$(echo "$BOARD_PATH" | cut -d'/' -f2)
          
          echo "port=$PORT_NAME" >> $GITHUB_OUTPUT
          echo "board=$BOARD_NAME" >> $GITHUB_OUTPUT

      - name: ⚙️ ESP32 eszközlánc beállítása (ha ESP32-t választottál)
        # Csak akkor fut, ha a port=esp32
        if: steps.config.outputs.port == 'esp32'
        uses: espressif/action-setup-esp-idf@v1
        with:
          esp-idf-version: latest
          
      - name: Compile Cross-Compiler (mpy-cross)
        run: make -C mpy-cross

      - name: 🔨 Firmware Fordítása
        run: |
          # A make parancs most dinamikusan használja a meghatározott portot és boardot
          make -C ports/${{ steps.config.outputs.port }} BOARD=${{ steps.config.outputs.board }}

      - name: 📦 Firmware fájlok feltöltése Artifactként
        uses: actions/upload-artifact@v4
        with:
          # A feltöltött fájl neve is dinamikus lesz
          name: ${{ steps.config.outputs.board }}-firmware
          # A build mappa útvonala is dinamikus lesz
          path: ports/${{ steps.config.outputs.port }}/build-${{ steps.config.outputs.board }}