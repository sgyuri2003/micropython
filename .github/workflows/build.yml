name: CI Build

on: [push]

jobs:
  build_firmware:
    runs-on: ubuntu-latest  # Stabil Linux környezet használata

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true  # Letölti a submodulokat (HAL-t, stb.)

      - name: Install ARM Toolchain
        run: sudo apt install gcc-arm-none-eabi build-essential

      - name: Build mpy-cross
        run: make -C mpy-cross

      - name: Build MY_H743_BOARD Firmware
        # A fordítás a ports/stm32 mappában történik
        run: make -C ports/stm32 BOARD=MY_H743_BOARD

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: My_H743_board-firmware
          # A lefordított firmware.bin fájl a build-MY_H743_BOARD mappában van
          path: ports/stm32/build-MY_H743_BOARD/
