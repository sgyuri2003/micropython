name: CI Build - Multi-Board

on:
  workflow_dispatch:
    inputs:
      board_select:
        description: 'Válaszd ki a fordítandó board nevet (portot is tartalmazza)'
        required: true
        type: choice
        default: 'stm32/MY_H743_BOARD'
        options:
          # STM32 Boards
          - 'stm32/MY_H743_BOARD'
          - 'stm32/GARATRONIC_PYBSTICK26_F411'
          - 'stm32/PYBV4'
          - 'stm32/PYBV3'
          # ESP32 Boards
          - 'esp32/GENERIC'
          - 'esp32/ESP32_WROVER'
          - 'esp32/ESP32_GENERIC_S3'

jobs:
  build_firmware:
    runs-on: ubuntu-latest
    
    steps:
      - name: ⚙️ Kódbázis letöltése (Checkout)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: 🎯 Port és Board azonosítása
        id: config
        run: |
          BOARD_PATH="${{ github.event.inputs.board_select }}"
          PORT_NAME=$(echo "$BOARD_PATH" | cut -d'/' -f1)
          BOARD_NAME=$(echo "$BOARD_PATH" | cut -d'/' -f2)
          
          echo "port=$PORT_NAME" >> $GITHUB_OUTPUT
          echo "board=$BOARD_NAME" >> $GITHUB_OUTPUT

      - name: 🛠️ Build Környezet Beállítása (Általános)
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential python3 python3-pip
          sudo apt-get install -y gcc-arm-none-eabi 
          pip3 install pyelftools

      - name: Compile Cross-Compiler (mpy-cross)
        run: make -C mpy-cross

      # JAVÍTOTT ESP32 TELEPÍTÉS ÉS KÖRNYEZET BEÁLLÍTÁS
      - name: 🟢 ESP32 Eszközlánc Beállítása
        if: steps.config.outputs.port == 'esp32'
        run: |
          echo "--- ESP32 TOOLCHAIN TELEPÍTÉS INDUL ---"
          
          # Hozzáadjuk a toolchain beállításához szükséges Python csomagokat
          pip3 install setuptools wheel
          
          # 1. Telepítjük a szükséges toolchain-t (MicroPython belső parancs)
          make -C ports/esp32 toolchain
          
          # 2. Inicializáljuk a szükséges ESP-IDF almodulokat
          make -C ports/esp32 submodules
          
          # 3. Külön beállítjuk az ESP-IDF útvonalát a következő lépés számára
          echo "IDF_PATH=$GITHUB_WORKSPACE/ports/esp32/esp-idf" >> $GITHUB_ENV
          
          # Ezt a lépést a Micropython Makefile-ban lévő logikára bízzuk.
          
      - name: 🔨 Firmware Fordítása
        # Most már a beállított környezettel fut
        run: |
          make -C ports/${{ steps.config.outputs.port }} BOARD=${{ steps.config.outputs.board }}

      - name: 📦 Firmware fájlok feltöltése Artifactként
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.config.outputs.board }}-firmware
          path: ports/${{ steps.config.outputs.port }}/build-${{ steps.config.outputs.board }}